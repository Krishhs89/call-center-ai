version: "3.8"

services:
  call-center-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: call_center_ai
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data          # persist cache, call history, sample transcripts
      - ./config:/app/config      # persist mcp.yaml changes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false

  # Optional: Redis for production caching (uncomment to enable)
  # redis:
  #   image: redis:7-alpine
  #   container_name: call_center_redis
  #   ports:
  #     - "6379:6379"
  #   restart: unless-stopped

volumes:
  app_data:
    driver: local
